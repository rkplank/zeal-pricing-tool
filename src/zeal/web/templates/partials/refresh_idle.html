<div class="refresh-idle">
  {% if is_synthetic_mode %}
  <button class="btn-refresh" type="button" disabled>Refresh disabled</button>
  <span class="refresh-last">
    Synthetic mode uses seeded baseline recommendations. Awaiting production Marketplace Insights access before live eBay refresh.
  </span>
  {% else %}
  <button
    class="btn-refresh"
    hx-post="/refresh"
    hx-target="#refresh-region"
    hx-swap="innerHTML"
  >Refresh now</button>
  <span class="refresh-last">
    Last completed:
    {{ last_completed|datetime }}
  </span>
  {% endif %}
</div>
